<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOTIQ Basketball Analysis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        
        /* Splash Screen */
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        #splash.hide {
            animation: fadeOut 0.8s ease-out forwards;
        }
        
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        
        /* Logo Container */
        .logo-container {
            position: relative;
            margin-bottom: 60px;
            animation: logoFloat 3s ease-in-out infinite;
        }
        
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        /* Basketball Icon */
        .basketball {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #FF6B35 0%, #ff8c5a 100%);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 20px 60px rgba(255, 107, 53, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 20px 60px rgba(255, 107, 53, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 25px 70px rgba(255, 107, 53, 0.6); }
        }
        
        /* Basketball lines */
        .basketball::before,
        .basketball::after {
            content: '';
            position: absolute;
            background: rgba(0, 0, 0, 0.15);
        }
        
        .basketball::before {
            width: 2px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .basketball::after {
            width: 100%;
            height: 2px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .basketball-arc {
            position: absolute;
            width: 80%;
            height: 80%;
            border: 2px solid rgba(0, 0, 0, 0.15);
            border-radius: 50%;
            top: 10%;
            left: 10%;
        }
        
        /* App Name */
        .app-name {
            font-size: 48px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-shadow: 0 4px 20px rgba(255, 107, 53, 0.3);
        }
        
        .app-name .sq {
            color: #FF6B35;
        }
        
        /* Tagline */
        .tagline {
            font-size: 16px;
            color: #888;
            margin-bottom: 50px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        /* Loading Animation */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .loading-bar {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }
        
        .loading-bar::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #FF6B35, transparent);
            animation: loading 1.5s ease-in-out infinite;
        }
        
        @keyframes loading {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        
        .loading-text {
            color: #666;
            font-size: 14px;
            letter-spacing: 1px;
        }
        
        /* Dots animation */
        .dots {
            display: inline-block;
        }
        
        .dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
        
        /* Version */
        .version {
            position: absolute;
            bottom: 30px;
            color: #444;
            font-size: 12px;
            letter-spacing: 1px;
        }
        
        /* Particles effect */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 107, 53, 0.3);
            border-radius: 50%;
            animation: float 4s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0); opacity: 0; }
            50% { opacity: 1; }
        }
        
        .particle:nth-child(1) { top: 20%; left: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { top: 40%; left: 80%; animation-delay: 0.5s; }
        .particle:nth-child(3) { top: 60%; left: 30%; animation-delay: 1s; }
        .particle:nth-child(4) { top: 80%; left: 70%; animation-delay: 1.5s; }
        .particle:nth-child(5) { top: 30%; left: 50%; animation-delay: 2s; }
    </style>
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash">
        <!-- Floating particles -->
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        
        <!-- Logo -->
        <div class="logo-container">
            <div class="basketball">
                <div class="basketball-arc"></div>
            </div>
        </div>
        
        <!-- App Name -->
        <div class="app-name">
            <span class="sq">SHOTIQ</span> AI
        </div>
        
        <!-- Tagline -->
        <div class="tagline">Basketball Analysis</div>
        
        <!-- Loading -->
        <div class="loading-container">
            <div class="loading-bar"></div>
            <div class="loading-text">
                Loading<span class="dots"></span>
            </div>
        </div>
        
        <!-- Version -->
        <div class="version">Version 0.1.0</div>
    </div>
    
    <script>
        // Hide splash screen and load app after 4.5 seconds
        setTimeout(() => {
            const splash = document.getElementById('splash');
            splash.classList.add('hide');
            
            // After fade out animation, redirect to web app
            setTimeout(() => {
                window.location.href = 'https://app.shotiqai.com';
            }, 800); // Match fadeOut animation duration
        }, 4500);
    </script>
</body>
</html>
