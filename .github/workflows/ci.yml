# CI for SHOTIQ AI (Next.js app in the basketball-analysis/ subfolder).
# Type-checks, lints, tests, and does a full production build on every push/PR.
name: CI

on:
  push:
  pull_request:

# The app lives in a subfolder of the repo, not the repo root.
defaults:
  run:
    working-directory: basketball-analysis

jobs:
  build:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest

    env:
      # Prisma + `next build` import code that reads these at module load, so we
      # supply harmless dummy values. No real DB is reached during CI — Prisma
      # only needs a parseable URL for `generate`, and the build never connects.
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
      NEXTAUTH_SECRET: "ci-dummy-secret-not-used-in-production"
      NEXTAUTH_URL: "http://localhost:3060"
      NEXT_PUBLIC_APP_URL: "http://localhost:3060"
      # Keep the Next build off the network and within CI memory limits.
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: basketball-analysis/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Test
        run: npx vitest run

      - name: Build
        run: npm run build
