# CI for SHOTIQ AI (Next.js app in the basketball-analysis/ subfolder).
# Type-checks, lints, tests, benchmarks, and builds on every push/PR.
name: CI

on:
  push:
  pull_request:

# The app lives in a subfolder of the repo, not the repo root.
defaults:
  run:
    working-directory: basketball-analysis

jobs:
  build:
    name: typecheck · lint · test · benchmark · build
    runs-on: ubuntu-latest

    env:
      # Prisma + `next build` import code that reads these at module load, so we
      # supply harmless dummy values. No real DB is reached during CI.
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
      NEXTAUTH_SECRET: "ci-dummy-secret-not-used-in-production"
      NEXTAUTH_URL: "http://localhost:3060"
      NEXT_PUBLIC_APP_URL: "http://localhost:3060"
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: basketball-analysis/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate and validate
        run: npx prisma generate && npx prisma validate

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run

      - name: Public production-engine benchmark
        run: npm run benchmark:vision

      - name: Build
        run: npm run build
